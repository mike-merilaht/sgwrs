<div id="a">a</div>
<script>
    const ws = new WebSocket('ws://localhost:1234');
    ws.onopen = (e) => {
        ws.send('ping');
    };

    ws.onmessage = (e) => {
        window.a.innerText = e.data;
    }
</script>
<button onclick="ws.send('pinging')">Ping!</button>

<input type="text" id="text" />
<button onclick="ws.send(JSON.stringify({cmd: 'chat', body: window.text.value}))">Chat</button>
